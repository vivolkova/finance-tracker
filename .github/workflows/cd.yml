name: CD
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vivolkova/finance-tracker
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-push
    runs-on: self-hosted          # твой ноут с доступом к minikube
    steps:
      - run: |
          kubectl set image deployment/finance-tracker `
            finance-tracker=ghcr.io/vivolkova/finance-tracker:sha-${{ github.sha }} `
            -n finance-tracker
          kubectl rollout status deployment/finance-tracker -n finance-tracker