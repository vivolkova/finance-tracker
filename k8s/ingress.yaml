apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-tracker
  namespace: finance-tracker
spec:
  ingressClassName: nginx
  rules:
    - host: finance-tracker.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-tracker
                port:
                  number: 80
