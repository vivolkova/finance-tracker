apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: finance-tracker
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'finance-tracker'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['finance-tracker:80']